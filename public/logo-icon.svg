<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD166"/>
      <stop offset="100%" style="stop-color:#F7A500"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7e6"/>
      <stop offset="100%" style="stop-color:#fff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#c97b00" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="11" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Inner subtle highlight -->
  <rect width="48" height="24" rx="11" fill="rgba(255,255,255,0.12)"/>
  <!-- Lightning bolt -->
  <path d="M27 6 L14 26 L22 26 L21 42 L34 22 L26 22 Z"
    fill="url(#bolt)"
    stroke="rgba(0,0,0,0.08)"
    stroke-width="0.5"/>
